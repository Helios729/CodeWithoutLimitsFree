# Netlify config for the Code Without Limits Expo web build
# Place this at the ROOT of your GitHub repo so Netlify auto-detects it.
#
# REQUIRED environment variable — set this in Netlify's dashboard under
# Site settings -> Environment variables (NOT here, since this file is
# committed to a public repo and this ID should still be reviewed per-site):
#   EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID = your Web OAuth Client ID from
#   Google Cloud Console (ends in .apps.googleusercontent.com)
# Without it, Google sign-in on the website will fail; the rest of the
# site (browsing, demo mode) still works fine without it.

[build]
  base    = "frontend"
  command = "npx expo export --platform web --output-dir dist"
  publish = "dist"

# Proxy /api/* to the FastAPI backend, so the same domain (codewithoutlimits.org)
# serves both the website and the API for web + native clients.
# REPLACE the placeholder below with your backend's real host once it's deployed
# (e.g. Render, Fly.io, Railway).
[[redirects]]
  from   = "/api/*"
  to     = "https://railway.app/railway.schema.json/api/:splat"
  status = 200
  force  = true

# SPA fallback so Expo Router deep-links work on refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
